base_model: meta-llama/Llama-3.2-1B-Instruct

chat_template: llama3

rl: grpo

trl:
  beta: 0.001
  max_completion_length: 128
  num_generations: 2
  temperature: 0.7
  top_p: 0.95

  # DRPO is implemented in the async GRPO trainer, so route through it.
  use_vllm: true
  use_data_producer: true

  # DRPO divergence-regularized loss (arxiv 2606.09821).
  loss_type: drpo
  drpo_epsilon: 12.5         # regularization threshold (paper §4)
  drpo_mu_weighted: true     # token-adaptive trust region eps_t = eps / mu (paper §3)

  reward_funcs:
    - rwd.format_reward
    - rwd.correctness_reward
  reward_weights: [1.0, 2.0]

  log_completions: true
  num_completions_to_print: 3
  scale_rewards: true

datasets:
  - path: openai/gsm8k
    name: main
    split: train[:1000]
    type: rwd.gsm8k_transform

val_set_size: 0.0
output_dir: ./outputs/llama3-drpo-out

sequence_len: 512
sample_packing: false
pad_to_sequence_len: false

gradient_accumulation_steps: 8
micro_batch_size: 1
num_epochs: 1
max_steps: 100

optimizer: adamw_torch_fused
lr_scheduler: cosine
learning_rate: 5e-5
weight_decay: 0.01
warmup_steps: 10

bf16: auto
tf32: true

gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false

attn_implementation: flash_attention_2
logging_steps: 1
save_steps: 50
save_safetensors: true

special_tokens:
  pad_token: "<|end_of_text|>"


seed: 42
