name: Outrider Convention Pass

# Phase B — runs after the fidelity audit completes. Extracts contributor
# conventions from the target repo's recent merged PRs, runs an agentic
# patch session bounded to non-algorithmic changes, force-pushes with bot
# attribution, and writes evidence to the action run-summary.

on:
  workflow_run:
    workflows: ["Outrider Fidelity Audit"]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to refine'
        required: true
        type: number

jobs:
  resolve-pr:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.lookup.outputs.pr_number }}
    steps:
      - name: Resolve PR (by trigger label — robust across workflow_run hops)
        id: lookup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.pr_number }}" ]; then
            PR_NUMBER="${{ inputs.pr_number }}"
          else
            PR_NUMBER=$(gh pr list --repo "${{ github.repository }}" \
              --label "outrider:fidelity-done" \
              --state open \
              --json number,author \
              --jq '[.[] | select(.author.login == "app/remyx-ai")] | .[0].number // ""')
          fi
          if [ -z "$PR_NUMBER" ]; then
            echo "No open remyx-ai[bot] PR carries outrider:fidelity-done; skipping"
            exit 0
          fi
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Resolved PR #$PR_NUMBER (by label outrider:fidelity-done)"

  convention:
    needs: resolve-pr
    if: needs.resolve-pr.outputs.pr_number != ''
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    env:
      REMYX_API_KEY: ${{ secrets.REMYX_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Mint Remyx bot token
        id: remyx-bot
        shell: bash
        run: |
          token="$(curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.REMYX_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"repo\": \"${{ github.repository }}\"}" \
            "https://engine.remyx.ai/api/v1.0/github/installation-token" \
            | python3 -c "import sys, json; print(json.load(sys.stdin).get('token', ''))")" || token=""
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"
      - uses: remyxai/outrider@salma/remyx-140-refinement-pass-phase-a
        with:
          interest-id: e8a82d88-47e2-4cbb-99a6-bd7446cea409
          mode: convention
          pr-number: ${{ needs.resolve-pr.outputs.pr_number }}
          github-token: ${{ steps.remyx-bot.outputs.token }}
